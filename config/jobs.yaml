# Jobs configuration for Deeptendies Quantum Agent
# This file defines scheduled tasks and job parameters

jobs:
  - id: quantum_analysis
    name: Quantum Market Analysis
    schedule: "*/5 * * * *"  # Every 5 minutes
    enabled: true
    parameters:
      minConfidenceThreshold: 0.5
      maxSignalsPerCycle: 10

  - id: portfolio_rebalance
    name: Portfolio Rebalancing
    schedule: "0 */15 * * *"  # Every 15 minutes
    enabled: true
    parameters:
      rebalanceThreshold: 0.02
      maxTradesPerCycle: 5

  - id: risk_assessment
    name: Risk Assessment
    schedule: "0 * * * *"  # Every hour
    enabled: true
    parameters:
      varConfidence: 0.95
      checkDrawdown: true
      maxDrawdownPercent: 10

  - id: regime_detection
    name: Market Regime Detection
    schedule: "*/10 * * * *"  # Every 10 minutes
    enabled: true
    parameters:
      superpositionThreshold: 0.7
      crisisVolatilityThreshold: 0.02